{% extends "base.html" %}
{% block title %}Subscribe — {{ config.store_name }}{% endblock %}
{% block content %}
<div class="container py-5" style="max-width:600px;">
  <h1 class="mb-2">Start Your Store</h1>
  <p class="text-muted mb-4">$20/month after a 14-day free trial. Cancel anytime.</p>

  {% if request.args.get('cancelled') %}
  <div class="alert alert-warning">Checkout cancelled. No charge was made.</div>
  {% endif %}

  <form id="subscribe-form">
    <div class="mb-3">
      <label class="form-label">Store Name</label>
      <input type="text" class="form-control" id="store_name" required placeholder="My Thrift Shop">
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" id="email" required placeholder="you@example.com">
    </div>
    <button type="submit" class="btn btn-primary btn-lg w-100" id="checkout-btn">
      Start Free Trial →
    </button>
  </form>
</div>

<script>
document.getElementById('subscribe-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('checkout-btn');
  btn.disabled = true;
  btn.textContent = 'Redirecting...';

  const res = await fetch('/create-checkout-session', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      store_name: document.getElementById('store_name').value,
      email: document.getElementById('email').value,
    })
  });
  const data = await res.json();
  if (data.url) {
    window.location = data.url;
  } else {
    alert(data.error || 'Something went wrong. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Start Free Trial →';
  }
});
</script>
{% endblock %}
